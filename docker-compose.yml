version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: agentic-security-db
    environment:
      POSTGRES_DB: agentic_security
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - agentic-security
    security_opt:
      - no-new-privileges:true

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-security-api
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/agentic_security
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8080,http://dashboard
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount source for development; remove for production
      - ./src:/app/src:ro
      - ./payloads:/app/payloads:ro
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - agentic-security
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # React Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: agentic-security-dashboard
    ports:
      - "3000:8080"
    depends_on:
      - api
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
      - NET_RAW
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - agentic-security
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local

networks:
  agentic-security:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
