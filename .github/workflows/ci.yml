name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  security-events: write
  checks: write
  pull-requests: write

jobs:
  # Code Quality and Linting
  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort

      - name: Check formatting with Black
        run: black --check src/ tests/ || true

      - name: Check import sorting with isort
        run: isort --check-only src/ tests/ || true

      - name: Lint with Ruff
        run: ruff check src/ tests/

  # Type Checking
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt mypy types-pyyaml types-requests

      - name: Type check with MyPy
        run: mypy src/ --ignore-missing-imports || true

  # Security Scanning - SAST
  sast-scan:
    name: Static Application Security Testing
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Semgrep SAST Scan
        run: |
          semgrep scan \
            --config p/python \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/flask \
            --sarif \
            --output semgrep.sarif \
            || true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # Secret Scanning
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Dependency Vulnerability Scanning
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pip-audit

      - name: pip-audit Dependency Check
        run: pip-audit -r requirements.txt --warn-only || true

  # Unit and Integration Tests
  test:
    name: Unit and Integration Tests
    runs-on: ubuntu-latest
    needs: [lint-and-format, type-check]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_agentic_security
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_agentic_security
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          pytest tests/ \
            -v \
            --cov=src/agentic_security \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            --tb=short

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # Build and Scan Docker Images
  build-and-scan:
    name: Build and Scan Docker Images
    runs-on: ubuntu-latest
    needs: [sast-scan, secret-scan, dependency-scan]
    outputs:
      api-image: ${{ steps.image-names.outputs.api-image }}
      dashboard-image: ${{ steps.image-names.outputs.dashboard-image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image names
        id: image-names
        run: |
          echo "api-image=agentic-security-api:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "dashboard-image=agentic-security-dashboard:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ steps.image-names.outputs.api-image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Dashboard Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dashboard
          push: false
          load: true
          tags: ${{ steps.image-names.outputs.dashboard-image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scan - API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image-names.outputs.api-image }}
          format: 'sarif'
          output: 'trivy-api.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy vulnerability scan - Dashboard
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image-names.outputs.dashboard-image }}
          format: 'sarif'
          output: 'trivy-dashboard.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy SARIF - API
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api

      - name: Upload Trivy SARIF - Dashboard
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-dashboard.sarif
          category: trivy-dashboard

  # Docker Compose Integration Test
  integration-test:
    name: Docker Compose Integration Test
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Docker Compose services
        run: docker compose up -d --build

      - name: Wait for API to be ready
        run: |
          echo "Waiting for API to start..."
          timeout 120 bash -c 'until curl -sf http://localhost:8000/ > /dev/null 2>&1; do sleep 2; done'
          echo "API is ready"

      - name: Wait for Dashboard to be ready
        run: |
          echo "Waiting for Dashboard to start..."
          timeout 120 bash -c 'until curl -sf http://localhost:3000/health > /dev/null 2>&1; do sleep 2; done'
          echo "Dashboard is ready"

      - name: Test API endpoint
        run: |
          curl -sf http://localhost:8000/ | jq .
          echo "API test passed"

      - name: Test Dashboard endpoint
        run: |
          curl -sf http://localhost:3000/health
          echo "Dashboard test passed"

      - name: Test API with database
        run: |
          curl -sf http://localhost:8000/api/v1 | jq .
          echo "API database test passed"

      - name: Collect logs
        if: always()
        run: |
          echo "=== API Logs ==="
          docker compose logs api || true
          echo "=== Dashboard Logs ==="
          docker compose logs dashboard || true
          echo "=== Database Logs ==="
          docker compose logs db || true

      - name: Cleanup
        if: always()
        run: docker compose down -v

  # Report Job Status
  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [lint-and-format, type-check, sast-scan, secret-scan, dependency-scan, test, build-and-scan, integration-test]
    if: always()
    steps:
      - name: Check job status
        run: |
          if [[ "${{ needs.lint-and-format.result }}" == "failure" || \
                "${{ needs.type-check.result }}" == "failure" || \
                "${{ needs.sast-scan.result }}" == "failure" || \
                "${{ needs.secret-scan.result }}" == "failure" || \
                "${{ needs.dependency-scan.result }}" == "failure" || \
                "${{ needs.test.result }}" == "failure" || \
                "${{ needs.build-and-scan.result }}" == "failure" || \
                "${{ needs.integration-test.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed successfully"
